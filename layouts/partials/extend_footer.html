{{- /* Footer custom content area start */ -}}
<style>
    .goatcounter-count {
        font-variant-numeric: tabular-nums;
    }
</style>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.goatcounter-count').forEach(function (el) {
            var path = el.getAttribute('data-goatcounter-path');
            if (!path) return;
            
            // Normalize path: remove trailing slash (e.g., /zh/ -> /zh)
            var p = path.replace(/\/$/, '');
            // Prefix with hostname to match the reporting format: /domain.com/path
            var fullPath = '/' + location.host + (p || '');
            
            // Fetch from GoatCounter API
            var api_url = 'https://stats.brez.top/counter/' + encodeURIComponent(fullPath) + '.json';
            
            fetch(api_url)
                .then(function (response) { return response.json(); })
                .then(function (data) {
                    if (data && typeof data.count !== 'undefined') {
                        el.innerText = data.count + ' 次阅读';
                    } else {
                        el.innerText = '0 次阅读';
                    }
                })
                .catch(function (error) {
                    console.warn('GoatCounter error:', error);
                    el.innerText = '0 次阅读';
                });
        });
    });
</script>
{{- /* Footer custom content area end */ -}}
