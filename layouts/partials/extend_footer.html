{{- /* Footer custom content area start */ -}}
<style>
    .goatcounter-count {
        font-variant-numeric: tabular-nums;
    }
</style>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const SITE_URL = "https://stats.brez.top";
        document.querySelectorAll('.goatcounter-count').forEach(async el => {
            let path = el.getAttribute('data-goatcounter-path') || location.pathname;
            path = path.replace(/\/$/, '') || '/';
            const api_url = `${SITE_URL}/counter/${path}.json`;
            try {
                const r = await fetch(api_url);
                if (r.ok) {
                    const data = await r.json();
                    el.innerText = (data.count || 0) + ' 次阅读';
                }
            } catch (e) {
                if (el.innerText === '...') el.innerText = '0 次阅读';
            }
        });
    });
</script>
{{- /* Footer custom content area end */ -}}
