baseURL = 'https://breztop.github.io/'  # 请根据您的实际部署地址修改
title = "breeze's blog"
theme = 'PaperMod'

defaultContentLanguage = "zh"  # 设置默认语言为中文
defaultContentLanguageInSubdir = true  # 在子目录中包含语言代码

[languages]
  [languages.zh]  # 中文配置
    languageName = "中文"
    weight = 1
    title = "breeze 的博客"
    [languages.zh.menu]
      [[languages.zh.menu.main]]
        identifier = "home"
        name = "首页"
        url = "/"
        weight = 1
      [[languages.zh.menu.main]]
        identifier = "posts"
        name = "文章"
        url = "/posts/"
        weight = 10
      [[languages.zh.menu.main]]
        identifier = "tags"
        name = "标签"
        url = "/tags/"
        weight = 20
      [[languages.zh.menu.main]]
        identifier = "about"
        name = "关于"
        url = "/about/"
        weight = 30

  [languages.en]  # 英文配置
    languageName = "English"
    weight = 2
    title = "breeze's blog"
    [languages.en.menu]
      [[languages.en.menu.main]]
        identifier = "home"
        name = "Home"
        url = ""
        weight = 1
      [[languages.en.menu.main]]
        identifier = "posts"
        name = "Posts"
        url = "posts/"
        weight = 10
      [[languages.en.menu.main]]
        identifier = "tags"
        name = "Tags"
        url = "tags/"
        weight = 20
      [[languages.en.menu.main]]
        identifier = "about"
        name = "About"
        url = "about/"
        weight = 30

[params]
  title = "breeze's blog"
  description = "breeze's blog"
  author = "breeze"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowCodeCopyButtons = true
  bio = "一名开发与自动化的工程师，致力于构建优雅、高效的解决方案。"
  keywords = ["web开发", "自动化", "博客", "技术分享"]

  enableAds = true
  
  [params.ads]
    showOnHome = true
    showOnPosts = true
    showOnPages = true
    showOnList = true
    position = "multiple"
  
  [params.homeInfoParams]
    title = "欢迎来到我的博客"
    content = "这里是个人博客，分享技术、生活和思考"
    
    AlignSocialIconsTo = "left"
  
  # 站点地图配置
  [params.sitemap]
    changefreq = "weekly"
    priority = 0.5
    enabled = true
    disableKinds = ["RSS", "404"]
    
  [params.sitemap.page]
    home = { changefreq = "daily", priority = 1.0 }
    posts = { changefreq = "monthly", priority = 0.8 }
    tags = { changefreq = "weekly", priority = 0.3 }

[author]
  name = "breeze"

[socialIcons]
  [socialIcons.github]
    name = "GitHub"
    url = "https://github.com/breztop"
