baseURL = 'https://breztop.github.io/'
languageCode = 'en-us'
title = "breeze's blog"
theme = 'PaperMod'

[params]
  title = "breeze's blog"
  description = "breeze's blog"
  author = "breeze"
  defaultTheme = "auto"
  ShowReadingTime = true  # 显示阅读时间
  ShowShareButtons = true # 显示分享按钮
  ShowCodeCopyButtons = true  # 代码复制按钮
  
[author]
  name = "breeze"

[socialIcons]
  [socialIcons.github]
    name = "GitHub"
    url = "https://github.com/breztop"
  

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10
  
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20
