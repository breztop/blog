baseURL = 'https://breztop.github.io/'  # 请根据您的实际部署地址修改
title = "breeze's blog"
theme = 'PaperMod'

defaultContentLanguage = "zh"  # 设置默认语言为中文
defaultContentLanguageInSubdir = true  # 在子目录中包含语言代码

[languages]
  [languages.zh]  # 中文配置
    languageName = "中文"
    weight = 1
    title = "你的网站标题"
  
  [languages.en]  # 英文配置
    languageName = "English"
    weight = 2
    title = "Your Site Title"

[params]
  title = "breeze's blog"
  description = "breeze's blog"
  author = "breeze"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowCodeCopyButtons = true
  bio = "一名开发与自动化的工程师，致力于构建优雅、高效的解决方案。"
  keywords = ["web开发", "自动化", "博客", "技术分享"]

  enableAds = true
  adContent = """
  <div style="padding:0.5rem;">
    <a href="https://example.com" target="_blank" rel="sponsored nofollow" 
       style="color:var(--primary);text-decoration:none;">
      <strong>产品名称</strong><br>
      <small>产品描述...</small>
    </a>
  </div>
  """
  
  [params.homeInfoParams]
    title = "欢迎来到我的博客"
    content = "这里是个人博客，分享技术、生活和思考"
    
    AlignSocialIconsTo = "left"
    
  [params.ads]
    showOnHome = true
    showOnPosts = false
    showOnPages = false
    position = "home_info_bottom"
  
  # 站点地图配置
  [params.sitemap]
    changefreq = "weekly"
    priority = 0.5
    enabled = true
    disableKinds = ["RSS", "404"]
    
  [params.sitemap.page]
    home = { changefreq = "daily", priority = 1.0 }
    posts = { changefreq = "monthly", priority = 0.8 }
    tags = { changefreq = "weekly", priority = 0.3 }

[author]
  name = "breeze"

[socialIcons]
  [socialIcons.github]
    name = "GitHub"
    url = "https://github.com/breztop"

[menu]
  # 首页
  [[menu.main]]
    identifier = "home"
    name = "首页"
    url = "/"
    weight = 1
  
  # 文章列表
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10
  
  # 标签
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20
  
  # 关于页面
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 30
  