[params]
  title = "breeze's blog"
  description = "breeze's blog"
  author = "breeze"
  defaultTheme = "auto"
  mainSections = ["posts", "tech", "life"]
  ShowReadingTime = true
  ShowShareButtons = true
  ShowCodeCopyButtons = true
  bio = "一名开发与自动化的工程师，致力于构建优雅、高效的解决方案。"
  keywords = ["web开发", "自动化", "博客", "技术分享"]

  enableAds = true

  [params.assets]
    favicon = "/favicon.svg"
    favicon16x16 = "/favicon.svg"
    favicon32x32 = "/favicon.svg"
    apple_touch_icon = "/favicon.svg"
  
  [params.ads]
    showOnHome = true
    showOnPosts = true
    showOnPages = true
    showOnList = true
    position = "multiple"
  
  [params.homeInfoParams]
    title = "欢迎来到我的博客"
    content = "这里是个人博客，分享技术、生活和思考"
    
    AlignSocialIconsTo = "left"
  
  # 站点地图配置
  [params.sitemap]
    changefreq = "weekly"
    priority = 0.5
    enabled = true
    disableKinds = ["RSS", "404"]
    
  [params.sitemap.page]
    home = { changefreq = "daily", priority = 1.0 }
    posts = { changefreq = "monthly", priority = 0.8 }
    tags = { changefreq = "weekly", priority = 0.3 }

[author]
  name = "breeze"

[socialIcons]
  [socialIcons.github]
    name = "GitHub"
    url = "https://github.com/breztop"

[markup]
  [markup.highlight]
    noClasses = false
    style = "monokai" # or any style, PaperMod uses its own classes if noClasses is false
    lineNos = true
